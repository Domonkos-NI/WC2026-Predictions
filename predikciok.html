const COLS = ["Meccs","Szakasz","Forduló / Csoport","Dátum (UTC)","Hazai csapat","Vendég csapat","Eredmény (tipp)","Eredmény (tény)","Találat","Győztes (tipp)","Szögletek (tipp)","Szögletek (tény)","Sárga lapok (tipp)","Sárga lapok (tény)","Tizenegyespárbaj","Státusz"];
let DATA={rows:[]}, filter="all", query="", sortCol=null, sortAsc=true;

function statusClass(s){ if(s==="Lejátszott")return "s-actual"; if(s==="Frissített előrejelzés")return "s-recal"; return "s-locked"; }
function render(){
  const thead = document.querySelector("#tbl thead");
  const tbody = document.querySelector("#tbl tbody");
  thead.innerHTML = "<tr>" + COLS.map(c=>"<th data-c='"+c+"'>"+c+"</th>").join("") + "</tr>";
  let rows = DATA.rows.slice();
  if(filter==="played") rows = rows.filter(r=>r["Státusz"]==="Lejátszott");
  if(filter==="upcoming") rows = rows.filter(r=>r["Státusz"]!=="Lejátszott");
  if(query){ const q=query.toLowerCase(); rows = rows.filter(r=>(r["Hazai csapat"]+" "+r["Vendég csapat"]).toLowerCase().includes(q)); }
  if(sortCol){ rows.sort((a,b)=>{ let x=a[sortCol],y=b[sortCol]; if(!isNaN(parseFloat(x))&&!isNaN(parseFloat(y))){x=parseFloat(x);y=parseFloat(y);} return (x>y?1:x<y?-1:0)*(sortAsc?1:-1); }); }
  tbody.innerHTML = rows.map(r=>"<tr>"+COLS.map(c=>{
    if(c==="Státusz") return "<td><span class='tag "+statusClass(r[c])+"'>"+r[c]+"</span></td>";
    return "<td>"+(r[c]===null||r[c]===undefined?"":r[c])+"</td>";
  }).join("")+"</tr>").join("");
  document.querySelectorAll("#tbl th").forEach(th=>th.onclick=()=>{ const c=th.dataset.c; if(sortCol===c)sortAsc=!sortAsc; else {sortCol=c;sortAsc=true;} render(); });
  document.querySelector("#updated").textContent = "Frissítve: " + (DATA.generated_at||"ismeretlen") + "  •  " + rows.length + " meccs";
}
function applyData(d, source){ DATA=d; document.querySelector("#src").textContent="Adatforrás: "+source; render(); }
document.querySelector("#q").addEventListener("input", e=>{ query=e.target.value; render(); });
document.querySelectorAll(".btn").forEach(b=>b.addEventListener("click", ()=>{
  document.querySelectorAll(".btn").forEach(x=>x.classList.remove("active")); b.classList.add("active"); filter=b.dataset.filter; render();
}));
applyData(EMBEDDED, "beágyazott (utolsó ismert)");
if(DATA_URL){
  fetch(DATA_URL, {cache:"no-store"})
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(d=>{ var ok = d && d.rows && d.rows.length && COLS.every(c=>Object.prototype.hasOwnProperty.call(d.rows[0], c)); if(ok){ applyData(d, "online (mindig friss)"); } else { document.querySelector("#src").textContent="Adatforrás: beágyazott (az online JSON régi formátumú — töltsd fel újra a friss predikciok_web.json fájlt)"; } })
